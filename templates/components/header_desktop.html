{% load static %}

<header class="hidden md:block sticky top-0 z-20 bg-white/95 border-b border-gray-100 shadow-sm backdrop-blur-md">
    <div class="container mx-auto px-6">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a href="{% url 'portfolio-index' %}" class="flex items-center group">
                <img src="{% static 'portfolio/svg/djimiga-tech-logo-horizontal-transparent.svg' %}" alt="Djimiga Tech" class="h-12 group-hover:opacity-80 transition-opacity duration-300" />
            </a>

            <!-- Navigation Desktop -->
            <nav class="flex items-center gap-1">
                <a href="{% url 'blog-index' %}" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 transition-all duration-200">
                    Blog
                </a>
                <a href="{% url 'services:service_list' %}" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 transition-all duration-200">
                    Services
                </a>
                <a href="{% url 'formations:formation_index' %}"
                   class="inline-flex items-center px-4 py-2 rounded-full bg-emerald-600 text-white text-sm font-semibold shadow-sm hover:bg-emerald-700 hover:shadow-md transition-all duration-200">
                    Formations
                </a>

                {% if user.is_staff %}
                <span class="mx-1 h-5 w-px bg-gray-200"></span>
                <a href="{% url 'dashboard:home' %}" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:text-violet-600 hover:bg-violet-50 transition-all duration-200">
                    Admin
                </a>
                {% endif %}

                <span class="mx-1 h-5 w-px bg-gray-200"></span>

                {% if user.is_authenticated %}
                <a href="{% url 'saas:client_dashboard' %}" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-full border border-cyan-600 text-cyan-600 text-sm font-semibold hover:bg-cyan-50 transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Mon Espace
                </a>
                <a href="{% url 'logout' %}" class="px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all duration-200" title="Déconnexion">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                </a>
                {% else %}
                <a href="{% url 'login' %}" class="inline-flex items-center px-4 py-2 rounded-full border border-cyan-600 text-cyan-600 text-sm font-semibold hover:bg-cyan-50 transition-all duration-200">
                    Connexion
                </a>
                {% endif %}
            </nav>
        </div>
    </div>
</header>
