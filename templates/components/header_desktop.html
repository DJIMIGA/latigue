{% load static %}

<header class="hidden md:block sticky top-0 z-20 bg-[#0D1117]/95 border-b border-[#1F2937] shadow-md backdrop-blur-md">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-20">
            <!-- Logo avec animation et effet de survol -->
            <a href="{% url 'portfolio-index' %}" class="flex items-center group relative">
                <div class="absolute inset-0 bg-gradient-to-r from-[#00FF88]/20 to-[#00E5FF]/20 rounded-full blur-lg group-hover:blur-xl transition-all duration-500 opacity-0 group-hover:opacity-100"></div>
                <img src="{% static 'portfolio/svg/djimiga-tech-logo-horizontal-transparent.svg' %}" alt="Djimiga Tech" class="h-14 group-hover:opacity-80 transition-all duration-300" />
            </a>

            <!-- Navigation Desktop -->
            <nav class="flex items-center space-x-6 lg:space-x-8">
                <a href="{% url 'about' %}" class="font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                    À propos
                </a>
                <a href="{% url 'blog-index' %}" target="_blank" rel="noreferrer" class="font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                    Blog
                </a>
                <a href="{% url 'services:service_list' %}" target="_blank" rel="noreferrer" class="font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                    Services
                </a>
                <!-- CTA Formations -->
                <a href="{% url 'formations:formation_index' %}"
                   target="_blank"
                   rel="noreferrer"
                   class="inline-flex items-center px-4 py-2 rounded-full bg-[#00FF88] text-black font-bold shadow-md hover:shadow-[0_0_20px_rgba(0,255,136,0.4)] hover:scale-105 transition-all duration-200">
                    Formations
                </a>

                {% if user.is_authenticated %}
                <a href="{% url 'formations:client_dashboard' %}" class="font-bold text-gray-300 hover:text-[#00E5FF] transition-colors duration-300">
                    👤 Mon Compte
                </a>
                <a href="{% url 'logout' %}" class="text-sm text-gray-500 hover:text-red-400 transition-colors duration-300">
                    Déconnexion
                </a>
                {% else %}
                <a href="{% url 'login' %}" class="inline-flex items-center px-4 py-2 rounded-full border border-[#00E5FF] text-[#00E5FF] font-bold hover:bg-[#00E5FF]/10 hover:shadow-[0_0_15px_rgba(0,229,255,0.3)] transition-all duration-200">
                    Connexion
                </a>
                {% endif %}
            </nav>

        </div>
    </div>
</header>
