{% load static %}

<!-- Header Mobile -->
<header class="md:hidden sticky top-0 z-20 bg-[#0D1117]/95 border-b border-[#1F2937] shadow-md backdrop-blur-md">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a href="{% url 'portfolio-index' %}" class="flex items-center group">
                <img src="{% static 'portfolio/svg/bolibana-logo.svg' %}" alt="Bolibana" class="h-10 w-10 group-hover:scale-110 transition-all duration-500" aria-hidden="true" />
            </a>

            <!-- Bouton menu mobile -->
                <button class="flex items-center justify-center w-10 h-10 rounded-full bg-[#111827] hover:bg-[#1F2937] transition-colors focus:outline-none focus:ring-2 focus:ring-[#00FF88]" id="mobile-menu-toggle" aria-label="Ouvrir le menu">
                    <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Menu mobile -->
<div id="mobile-menu" class="md:hidden fixed inset-0 z-50 hidden bg-[#060810]/98 backdrop-blur-md">
    <div class="flex flex-col h-full">
        <!-- En-tête du menu mobile -->
        <div class="flex items-center justify-between p-4 border-b border-[#1F2937]">
            <a href="{% url 'portfolio-index' %}" class="flex items-center group">
                <img src="{% static 'portfolio/svg/bolibana-logo.svg' %}" alt="Bolibana" class="h-10 w-10" />
            </a>
            <button id="close-menu" class="p-2 rounded-full hover:bg-[#1F2937] transition-colors">
                <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Navigation mobile -->
        <nav class="flex-1 px-4 py-8 space-y-6">
            <a href="{% url 'about' %}" class="block text-2xl font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                À propos
            </a>
            <a href="{% url 'blog-index' %}" target="_blank" rel="noreferrer" class="block text-2xl font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                Blog
            </a>
            <a href="{% url 'services:service_list' %}" target="_blank" rel="noreferrer" class="block text-2xl font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                Services
            </a>
            <a href="{% url 'formations:formation_list' %}" target="_blank" rel="noreferrer" class="block text-2xl font-bold text-gray-300 hover:text-[#00FF88] transition-colors duration-300">
                Formations
            </a>
        </nav>
    </div>
</div>
